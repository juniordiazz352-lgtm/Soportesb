<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background: linear-gradient(135deg, #0f172a, #020617);
}

.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    transition: all 0.3s ease;
}

.card:hover {
    transform: translateY(-5px);
    background: rgba(255,255,255,0.08);
}
</style>
</head>

<body class="text-white">

<div class="flex">

<!-- SIDEBAR -->
<div class="w-64 h-screen bg-black/40 backdrop-blur-xl p-6">

<h1 class="text-2xl font-bold mb-10">⚡ Support SaaS</h1>

<a href="/servers" class="block mb-4 hover:text-blue-400 transition">🌐 Servidores</a>

</div>

<!-- MAIN -->
<div class="flex-1">

<!-- NAVBAR -->
<div class="flex justify-between items-center p-6 bg-black/30 backdrop-blur">

<h2 class="text-xl">Dashboard</h2>

{% if user %}
<div class="flex items-center gap-3">
<img src="https://cdn.discordapp.com/avatars/{{user.id}}/{{user.avatar}}.png"
class="w-10 h-10 rounded-full">
<span>{{ user.username }}</span>
</div>
{% endif %}

</div>

<!-- CONTENT -->
<div class="p-10">
{% block content %}{% endblock %}
</div>

</div>

</div>

</body>
</html>
